pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,ts,jsx,tsx}'
      run: yarn oxlint {staged_files}
    fmt:
      glob: '*.{js,ts,jsx,tsx}'
      run: yarn oxfmt {staged_files}
    types:
      glob: '*.{js,ts,jsx,tsx}'
      exclude: 'docs/'
      run: yarn tsc
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: yarn commitlint --edit
